<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Document</title>
</head>
<body>
  <img src="assets/background-pattern-desktop.svg" alt="" class="background-pattern">
  <div class="container">
    <div class="faq-container">
      <div class="faq-row">
        <img src="assets/icon-star.svg" alt="star-icon" class="star-icon">
        <h1>FAQs</h1>
      </div>

        <div class="row">
          <p class="questions">What is Frontend Mentor, and how will it help me?</p>
          <button>
            <img src="assets/icon-plus.svg" alt="plus-icon" class="plus-icon first-button">
          </button>
        </div>
        <p class="first-answer answer"></p>

      <div>
        <div class="row">
          <p class="questions">Is Frontend Mentor free?</p>
          <button>
            <img src="assets/icon-plus.svg" alt="plus-icon" class="plus-icon second-button">
          </button>
        </div>
        <p class="second-answer answer"></p>
      </div>

      <div>
        <div class="row">
          <p class="questions">Can I use Frontend Mentor projects in my portfolio?</p>
          <button>
            <img src="assets/icon-plus.svg" alt="plus-icon" class="plus-icon third-button">
          </button>
        </div>
        <p class="third-answer answer"></p>
      </div>

      <div>
        <div class="row">
          <p class="questions">How can I get help if I'm stuck on a challenge?</p>
          <button>
            <img src="assets/icon-plus.svg" alt="plus-icon" class="plus-icon fourth-button">
          </button>
        </div>
        <p class="fourth-answer answer"></p>
      </div>
    </div>
  </div>
  <script src="faq.js"></script>
</body>
</html>
